/* ──────────────────────────────
   DATA LOADING
────────────────────────────── */
let _loadPromise = null; // dedup concurrent loadDriverData calls
async function loadDriverData() {
  if (_loadPromise) return _loadPromise; // piggyback on in-flight load
  _loadPromise = _loadDriverDataInner();
  try { return await _loadPromise; } finally { _loadPromise = null; }
}
async function _loadDriverDataInner() {
  _dataLoading = true;
  try {
  // ── Group 1: profile + driver record in parallel ──
  const [{ data: prof }, { data: drv0 }] = await Promise.all([
    db.from('profiles').select('*').eq('id', currentUser.id).single(),
    db.from('drivers').select('*').eq('profile_id', currentUser.id).order('created_at').limit(1).maybeSingle()
  ]);
  currentProfile = prof;

  // ── Phone OTP account linking ──
  // When a driver logs in via phone OTP, Supabase creates a new auth user with a new UUID.
  // Their existing driver record is linked to an older email-based profile UUID.
  // link_phone_auth_driver re-points the drivers row to the new phone-auth profile UUID.
  let linkedDrv = null;
  if (currentUser.phone) {
    try {
      const { data: linked, error: linkErr } = await db.rpc('link_phone_auth_driver', {
        p_phone_digits:   currentUser.phone,
        p_new_profile_id: currentUser.id
      });
      if (linkErr?.message?.includes('MULTIPLE_MATCHES')) {
        toast('Multiple driver accounts share this number — contact admin.');
        setTimeout(() => db.auth.signOut(), 2500);
        return;
      }
      if (linked?.length > 0) {
        // Re-fetch profile — it's now updated with the driver's real name/email
        const { data: refreshedProf } = await db.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
        currentProfile = refreshedProf;
        linkedDrv = linked[0];
      }
    } catch (e) {
      console.warn('Driver phone account link check failed:', e.message);
    }
  }

  // Auto-create driver record on first login (sequential — depends on group 1 result)
  let drv = linkedDrv || drv0;
  if (!drv) {
    // UPSERT with DB-level UNIQUE constraint on profile_id — race-safe (session 111)
    const { data: nd } = await db.from('drivers')
      .upsert({ profile_id: currentUser.id, is_active: true }, { onConflict: 'profile_id' })
      .select()
      .single();
    drv = nd;
  }
  currentDriver = drv;
  if (!currentDriver) {
    throw new Error('Could not load or create driver record');
  }

  const stopFields = `
    *,
    orders(*, customers(*), services(*))
  `;

  // Hide delivery stops whose parent order hasn't been marked ready yet.
  // These are "ghost deliveries" — the bag was picked up but never progressed
  // through processing in software (often because intake happened off-site).
  // Showing them would send the driver to a location with nothing to deliver.
  // Matches the admin dashboard RCC filter (NOT_READY_FOR_DELIVERY).
  const NOT_READY_FOR_DELIVERY = ['picked_up', 'processing', 'folding'];
  const isGhostDelivery = s =>
    s.stop_type === 'delivery' && NOT_READY_FOR_DELIVERY.includes(s.orders?.status);

  // ── Group 2: today's routes + messages in parallel ──
  const [{ data: routes }] = await Promise.all([
    db.from('routes')
      .select('id, name, status, run_date, template_id, route_templates(window_start, window_end)')
      .eq('driver_id', currentDriver.id)
      .eq('run_date', today())
      .neq('status', 'cancelled'),
    loadDriverMessages()
  ]);
  const allRoutesForToday = routes || [];

  // ── Time-window filter: only show routes that are relevant right now ──
  // A route is visible if:
  //   (a) now is within (window_start − 2h) to (window_end + 2h), OR
  //   (b) it has no template (show it, can't filter), OR
  //   (c) it'll be revealed later (kept in allRoutesForToday for stop-carry-forward check below)
  const PRE_WINDOW_HOURS = 2;
  const _now = new Date();
  const _todayStr = today(); // YYYY-MM-DD

  function isRouteVisible(r) {
    const tmpl = r.route_templates;
    if (!tmpl || !tmpl.window_start || !tmpl.window_end) return true; // no template → always show
    const winStart = new Date(`${_todayStr}T${tmpl.window_start}`);
    const winEnd   = new Date(`${_todayStr}T${tmpl.window_end}`);
    const showFrom = new Date(winStart.getTime() - PRE_WINDOW_HOURS * 60 * 60 * 1000);
    const hideAt   = new Date(winEnd.getTime()   + PRE_WINDOW_HOURS * 60 * 60 * 1000);
    return _now >= showFrom && _now <= hideAt;
  }

  // A route is "upcoming" if its window hasn't opened yet (not even the pre-buffer)
  // and it isn't already in progress. These get shown as a "Later Today" strip instead
  // of a full route card, to avoid confusing drivers about what to work on right now.
  function isUpcomingRoute(r) {
    if (r.status === 'in_progress') return false; // always treat as current
    const tmpl = r.route_templates;
    if (!tmpl || !tmpl.window_start) return false; // no window info → can't tell, treat as current
    const winStart = new Date(`${_todayStr}T${tmpl.window_start}`);
    const showFrom = new Date(winStart.getTime() - PRE_WINDOW_HOURS * 60 * 60 * 1000);
    return _now < showFrom;
  }

  // Split: upcoming routes (shown collapsed) vs current routes (shown as full cards)
  upcomingRoutes = allRoutesForToday.filter(r => isUpcomingRoute(r));
  todayRoutes = allRoutesForToday.filter(r => isRouteVisible(r) && !isUpcomingRoute(r));

  // ── Group 3: route stops (needs routeIds from group 2) ──
  let routeStops = [];
  const myRouteIds = allRoutesForToday.map(r => r.id); // ALL today's routes (visible + hidden)
  if (todayRoutes.length > 0) {
    const routeIds = todayRoutes.map(r => r.id);
    // Include stops explicitly assigned to this driver OR stops with NULL driver_id
    // (NULL = inherit from route's default driver, which is this driver since we
    //  already filtered routes by driver_id above)
    const { data: rs } = await db.from('route_stops')
      .select(stopFields)
      .in('route_id', routeIds)
      .or(`driver_id.eq.${currentDriver.id},driver_id.is.null`)
      .order('stop_number', { ascending: true });
    routeStops = rs || [];
  }

  // ── Carry forward: check hidden (past-window) routes for incomplete stops ──
  // If a morning route has un-done stops, show those stops even if the window passed
  // Exclude upcoming routes — they haven't started yet and should NOT be treated
  // as overdue carry-forwards. Only past-window routes need the carry-forward check.
  const hiddenRoutes = allRoutesForToday.filter(r => !isRouteVisible(r) && !isUpcomingRoute(r));
  if (hiddenRoutes.length > 0) {
    const hiddenIds = hiddenRoutes.map(r => r.id);
    const { data: carryStops } = await db.from('route_stops')
      .select(stopFields)
      .in('route_id', hiddenIds)
      .or(`driver_id.eq.${currentDriver.id},driver_id.is.null`)
      .in('status', ['pending', 'en_route'])   // only incomplete stops
      .order('stop_number', { ascending: true });
    if (carryStops?.length) {
      // Add those routes back to todayRoutes so they render with a section header
      carryStops.forEach(s => {
        if (!todayRoutes.find(r => r.id === s.route_id)) {
          const parentRoute = allRoutesForToday.find(r => r.id === s.route_id);
          if (parentRoute) todayRoutes.push({ ...parentRoute, _carryForward: true });
        }
      });
      routeStops = [...routeStops, ...carryStops];
    }
  }

  // ── Override / reassigned stops: stops on OTHER drivers' routes that were
  //    individually assigned to this driver for TODAY only ──
  let overrideStops = [];
  {
    // Find today's routes belonging to OTHER drivers that have stops assigned to me
    const { data: otherStops } = await db.from('route_stops')
      .select(`${stopFields}, routes!inner(id, name, run_date)`)
      .eq('driver_id', currentDriver.id)
      .eq('routes.run_date', today())
      .not('route_id', 'in', `(${myRouteIds.length ? myRouteIds.join(',') : '00000000-0000-0000-0000-000000000000'})`)
      .order('stop_number', { ascending: true });
    overrideStops = (otherStops || []).filter(s =>
      s.orders && !['delivered','cancelled'].includes(s.orders.status)
      && !['skipped','failed'].includes(s.status)
      && !isGhostDelivery(s)
    );
  }

  // Merge — mark override stops so they appear in the "Extra Stops" card
  const tagged = overrideStops.map(s => ({ ...s, _reassigned: true }));

  // Filter out stops that aren't actionable for the driver:
  // - Order delivered/cancelled = nothing to do
  // - Stop skipped/failed = admin already handled it
  // - Delivery whose parent order isn't ready yet = ghost delivery (see top of fn)
  routeStops = routeStops.filter(s =>
    s.orders && !['delivered','cancelled'].includes(s.orders.status)
    && !['skipped','failed'].includes(s.status)
    && !isGhostDelivery(s)
  );
  allStops = [...routeStops, ...tagged];

  // ── Fetch stops for upcoming (later-today) routes so drivers can preview them ──
  // These stops are tagged _upcoming:true so renderRoute() can show a "planning only" banner.
  if (upcomingRoutes.length > 0) {
    const upcomingIds = upcomingRoutes.map(r => r.id);
    const { data: uStops } = await db.from('route_stops')
      .select(stopFields)
      .in('route_id', upcomingIds)
      .or(`driver_id.eq.${currentDriver.id},driver_id.is.null`)
      .order('stop_number', { ascending: true });
    const taggedUpcoming = (uStops || [])
      .filter(s => s.orders && !['delivered','cancelled'].includes(s.orders.status)
        && !['skipped','failed'].includes(s.status)
        && !isGhostDelivery(s))
      .map(s => ({ ...s, _upcoming: true }));
    allStops = [...allStops, ...taggedUpcoming];
  }

  // ── Resolve addresses: use stop/order address_id, fall back to either leg then customer fallback ──
  const stopAddrIds = [...new Set(allStops.flatMap(s =>
    [s.address_id, s.orders?.pickup_address_id, s.orders?.delivery_address_id].filter(Boolean)
  ))];
  const custIds = [...new Set(allStops.map(s => s.orders?.customer_id).filter(Boolean))];
  let _addrById = {}, _fallbackByCust = {};
  const addrFetches = [];
  if (stopAddrIds.length) {
    addrFetches.push(db.from('addresses').select('id, customer_id, line1, line2, city, state, zip, lat, lng, delivery_instructions').in('id', stopAddrIds));
  }
  if (custIds.length) {
    addrFetches.push(db.from('addresses').select('id, customer_id, line1, line2, city, state, zip, lat, lng, delivery_instructions, is_default').in('customer_id', custIds).order('is_default', { ascending: false }));
  }
  if (addrFetches.length) {
    const results = await Promise.all(addrFetches);
    if (stopAddrIds.length && results[0]?.data) results[0].data.forEach(a => { _addrById[a.id] = a; });
    const defIdx = stopAddrIds.length ? 1 : 0;
    if (custIds.length && results[defIdx]?.data) results[defIdx].data.forEach(a => { if (!_fallbackByCust[a.customer_id]) _fallbackByCust[a.customer_id] = a; });
    allStops = allStops.map(s => {
      const sameLeg = s.stop_type === 'pickup' ? s.orders?.pickup_address_id : s.orders?.delivery_address_id;
      const otherLeg = s.stop_type === 'pickup' ? s.orders?.delivery_address_id : s.orders?.pickup_address_id;
      const sid = s.address_id || sameLeg || otherLeg;
      return { ...s, _addr: (sid && _addrById[sid]) || _fallbackByCust[s.orders?.customer_id] || null };
    });
  }

  // Sort stops by window time (earliest first) and assign clean display numbers
  sortStopsByWindow(allStops);

  // Persist to localStorage so next app open is instant
  saveDriverCache(currentUser.id, currentProfile, currentDriver, todayRoutes, allStops);

  // Load customer SMS now that we have stop/customer data
  loadCustomerSms().catch(console.error);
  } finally {
    _dataLoading = false;
  }
}

async function refreshRoute() {
  if (_dataLoading) return; // prevent overlapping loads
  showLoading(true);
  try { await loadDriverData(); } catch(e) { console.error(e); toast('Could not refresh — try again'); } finally { showLoading(false); }
  renderHome();
  renderRoute();
  toast('Route refreshed ↻');
}

/* ──────────────────────────────
   HOME
────────────────────────────── */
function renderHome() {
  const body = document.getElementById('home-body');
  const name = currentProfile?.first_name || 'Driver';
  const dateStr = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', timeZone: BIZ_TZ });
  // Exclude upcoming (later-today) stops from the progress counts on the home screen
  const currentStops = allStops.filter(s => !s._upcoming);
  const doneAll  = currentStops.filter(s => s.status === 'complete').length;
  const totalAll = currentStops.length;
  const multiRoute = todayRoutes.length > 1;

  let h = `<div class="home-hero">
    <div class="hero-greeting">${greet()}, ${name}.</div>
    <div class="hero-date">${dateStr}</div>`;

  // Helper to build a tappable route summary card
  const routeCard = (name, statusLabel, total, done, pct, onclickFn, extraStyle = '') => `
    <div class="route-summary-card" style="margin-bottom:10px;cursor:pointer;${extraStyle}" onclick="${onclickFn}">
      <div class="route-name">${name} &nbsp;<span style="font-size:12px;font-weight:500;color:rgba(255,255,255,0.45)">${statusLabel}</span></div>
      <div class="route-stats">
        <div class="rstat"><div class="rstat-num">${total}</div><div class="rstat-label">Stops</div></div>
        <div class="rstat"><div class="rstat-num">${done}</div><div class="rstat-label">Done</div></div>
        <div class="rstat"><div class="rstat-num">${total - done}</div><div class="rstat-label">Left</div></div>
        <div class="rstat"><div class="rstat-num">${pct}%</div><div class="rstat-label">Progress</div></div>
      </div>
      <div class="route-progress"><div class="route-progress-fill" style="width:${pct}%"></div></div>
    </div>`;

  if (totalAll > 0) {
    // Primary route cards (one per assigned route)
    if (todayRoutes.length > 1) {
      todayRoutes.forEach(route => {
        const rStops = allStops.filter(s => s.route_id === route.id && !s._upcoming);
        const rDone  = rStops.filter(s => s.status === 'complete').length;
        const rTotal = rStops.length;
        const rPct   = rTotal > 0 ? Math.round((rDone / rTotal) * 100) : 0;
        const statusLabel = route.status === 'in_progress' ? 'In Progress'
                          : route.status === 'complete'    ? 'Complete' : 'Scheduled';
        h += routeCard(route.name, statusLabel, rTotal, rDone, rPct, `setRouteFilter('${route.id}')`);
      });
    } else if (todayRoutes.length === 1) {
      // Single primary route — card is tappable, with an action button inside
      const route = todayRoutes[0];
      const pct   = totalAll > 0 ? Math.round((doneAll / totalAll) * 100) : 0;
      const statusLabel = route.status === 'in_progress' ? 'In Progress'
                        : route.status === 'complete'    ? 'Complete' : 'Scheduled';
      const btnLabel = route.status === 'complete' ? 'View Completed Route'
                     : route.status === 'in_progress' ? 'Continue Route' : 'Start Route';
      h += `<div class="route-summary-card" style="cursor:pointer" onclick="setRouteFilter('${route.id}')">
        <div class="route-name">${route.name} &nbsp;<span style="font-size:12px;font-weight:500;color:rgba(255,255,255,0.45)">${statusLabel}</span></div>
        <div class="route-stats">
          <div class="rstat"><div class="rstat-num">${totalAll}</div><div class="rstat-label">Stops</div></div>
          <div class="rstat"><div class="rstat-num">${doneAll}</div><div class="rstat-label">Done</div></div>
          <div class="rstat"><div class="rstat-num">${totalAll - doneAll}</div><div class="rstat-label">Left</div></div>
          <div class="rstat"><div class="rstat-num">${pct}%</div><div class="rstat-label">Progress</div></div>
        </div>
        <div class="route-progress"><div class="route-progress-fill" style="width:${pct}%"></div></div>
        <button class="btn-big" onclick="event.stopPropagation();setRouteFilter('${route.id}')">${btnLabel}</button>
      </div>`;
    }
    // Extra Stops card — always shown when reassigned stops exist (regardless of primary route count)
    const extraStops = allStops.filter(s => s._reassigned);
    if (extraStops.length > 0) {
      const eDone  = extraStops.filter(s => s.status === 'complete').length;
      const eTotal = extraStops.length;
      const ePct   = eTotal > 0 ? Math.round((eDone / eTotal) * 100) : 0;
      h += routeCard('Extra Stops', 'Reassigned', eTotal, eDone, ePct, `setRouteFilter('extra')`,
        'border-color:rgba(124,58,237,0.35)');
    }
  } else {
    h += `<div class="route-summary-card">
      <div class="route-name">No Stops Today</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.45)">No stops have been assigned to you yet.</div>
    </div>`;
  }

  // ── Later Today strip ────────────────────────────────────────────────
  // Upcoming routes (window hasn't opened yet) get a small collapsible
  // section instead of a full card, so drivers aren't confused about
  // what to work on right now.
  if (upcomingRoutes.length > 0) {
    const names = upcomingRoutes.map(r => r.name).join(', ');

    const peekCards = upcomingRoutes.map(r => {
      const tmpl = r.route_templates;
      const windowRange = fmtWindowRange(tmpl);
      const timeStr = windowRange || 'Scheduled later today';
      return `
        <div class="later-route-peek" onclick="setRouteFilter('${r.id}')">
          <div>
            <div class="later-route-peek-name">${r.name}</div>
            <div class="later-route-peek-time">${timeStr}</div>
          </div>
          <div class="later-route-peek-arrow">›</div>
        </div>`;
    }).join('');

    h += `
      <div class="later-today-wrap">
        <div class="later-today-header" onclick="toggleLaterToday()">
          <div class="later-today-left">
            <span class="later-today-label">Later today</span>
            <span class="later-today-names">${names}</span>
          </div>
          <span class="later-today-chevron" id="later-chevron">›</span>
        </div>
        <div class="later-today-body" id="later-body">
          ${peekCards}
        </div>
      </div>`;
  }
  // ────────────────────────────────────────────────────────────────────

  h += '</div>';

  // All-done banner when every stop is complete
  if (totalAll > 0 && doneAll === totalAll) {
    h += `<div class="home-section"><div class="completed-banner">All stops done — great work today!</div></div>`;
  }

  body.innerHTML = h;
}

/* ──────────────────────────────
   ROUTE LIST
────────────────────────────── */
function renderRoute() {
  const body = document.getElementById('route-body');

  if (allStops.length === 0) {
    document.getElementById('rh-title').textContent = "Today's Stops";
    document.getElementById('rh-sub').textContent = 'No stops assigned yet';
    document.getElementById('rh-bar').style.width = '0%';
    body.innerHTML = `<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg></div><div class="empty-title">No Stops Today</div><div class="empty-sub">Check back later — stops will appear here once they're assigned to you.</div><button class="btn-big" style="max-width:200px;margin:20px auto 0;font-size:15px;padding:12px" onclick="refreshRoute()">↻ Refresh</button></div>`;
    return;
  }

  // Determine which stops to show based on activeRouteFilter
  let visibleStops, viewTitle, isFiltered = false, isUpcomingView = false;
  if (activeRouteFilter === 'extra') {
    visibleStops = allStops.filter(s => s._reassigned);
    viewTitle    = 'Extra Stops';
    isFiltered   = true;
  } else if (activeRouteFilter) {
    visibleStops  = allStops.filter(s => s.route_id === activeRouteFilter);
    // Look up name in both current and upcoming routes
    viewTitle     = todayRoutes.find(r => r.id === activeRouteFilter)?.name
                 || upcomingRoutes.find(r => r.id === activeRouteFilter)?.name
                 || 'Route';
    isFiltered    = true;
    isUpcomingView = upcomingRoutes.some(r => r.id === activeRouteFilter);
  } else {
    // Unfiltered view: only show current-route stops (not upcoming ones)
    visibleStops = allStops.filter(s => !s._upcoming);
    viewTitle    = todayRoutes.length > 1 ? "Today's Routes" : (todayRoutes[0]?.name || "Today's Route");
  }

  const done  = visibleStops.filter(s => s.status === 'complete').length;
  const total = visibleStops.length;
  const pct   = total > 0 ? Math.round((done / total) * 100) : 0;

  const pickupCount   = visibleStops.filter(s => s.stop_type === 'pickup').length;
  const delivCount    = visibleStops.filter(s => s.stop_type === 'delivery').length;
  const typeParts     = [
    pickupCount   ? `${pickupCount} pickup${pickupCount !== 1 ? 's' : ''}`       : '',
    delivCount    ? `${delivCount} deliver${delivCount !== 1 ? 'ies' : 'y'}`     : '',
  ].filter(Boolean);
  const typeBreakdown = typeParts.length ? typeParts.join(' · ') : `${total} stop${total !== 1 ? 's' : ''}`;

  document.getElementById('rh-title').textContent = viewTitle;
  document.getElementById('rh-sub').textContent   = isUpcomingView
    ? `${typeBreakdown} · not started yet`
    : `${done} of ${total} stop${total !== 1 ? 's' : ''} complete`;
  document.getElementById('rh-bar').style.width   = pct + '%';

  // Render a single stop card
  const renderStopCard = (stop) => {
    const addr = stop._addr;
    const cust = stop.orders?.customers;
    const custName = cust ? `${cust.first_name_cache||''} ${cust.last_name_cache||''}`.trim() : 'Customer';
    const isDone    = stop.status === 'complete';
    const isSkip    = stop.status === 'skipped';
    const isFailed  = stop.status === 'failed';
    const isEnRoute = stop.status === 'en_route';
    const numClass   = isDone ? 'sn-done' : (isSkip || isFailed) ? 'sn-skip' : isEnRoute ? 'sn-enroute' : `sn-${stop.stop_type}`;
    const showBadge  = isDone || isSkip || isFailed || isEnRoute;
    const badgeClass = isDone ? 'sb-done' : (isSkip || isFailed) ? 'sb-skipped' : 'sb-enroute';
    const badgeText  = isDone ? 'Done' : (isSkip || isFailed) ? 'Incomplete' : 'En Route';
    const cardClass  = isDone || isSkip || isFailed ? ' done' : isEnRoute ? ' en-route' : '';
    const isPickup   = stop.stop_type === 'pickup';
    const typePill   = stop.stop_type
      ? `<span class="stop-badge ${isPickup ? 'sb-pickup' : 'sb-delivery'}">${isPickup ? '🧺 Pickup' : '📦 Delivery'}</span>`
      : '';
    const reassignedTag = stop._reassigned
      ? `<span style="font-size:10px;font-weight:700;color:#7c3aed;background:#f5f3ff;padding:2px 7px;border-radius:5px;margin-left:5px">↗ reassigned</span>`
      : '';
    return `<div class="stop-card${cardClass}" onclick="openStop('${stop.id}')">
      <div class="stop-num ${numClass}">${isDone ? '✓' : isSkip ? '⤷' : isFailed ? '✕' : isEnRoute ? '↑' : (stop._displayNum || stop.stop_number)}</div>
      <div class="stop-body">
        <div>${typePill}${showBadge ? ` <span class="stop-badge ${badgeClass}">${badgeText}</span>` : ''}${reassignedTag}</div>
        <div class="stop-name">${custName}</div>
        <div class="stop-addr">${addr ? `${addr.line1}, ${addr.city}` : 'No address'}</div>
        <div class="stop-meta">${stop.orders?.total_bags||1} bag${(stop.orders?.total_bags||1)!==1?'s':''} · ${stop.orders?.services?.name||'Service'}${(() => { const w = stopWindow(stop); return w.start ? ' · ' + fmtSlot(w.start, w.end) : ''; })()}${isDone && stop.completed_at ? ' · ' + fmtTime(stop.completed_at) : ''}${!isDone && !isSkip && !isFailed && stop.estimated_arrival ? ` · <span style="color:var(--accent);font-weight:600">ETA ${fmtTime(stop.estimated_arrival)}</span>` : ''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
        ${addr ? `<a href="${mapsLink(addr)}" target="_blank" onclick="event.stopPropagation()"
          style="display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;background:var(--bg);color:var(--muted);text-decoration:none;flex-shrink:0"
          title="Open in Maps">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
        </a>` : ''}
        <span class="stop-chevron">›</span>
      </div>
    </div>`;
  };

  let h = '<div style="padding:12px 14px">';

  // Back link shown when filtering to a specific route
  if (isFiltered) {
    h += `<div style="margin-bottom:12px">
      <button onclick="activeRouteFilter=null;renderRoute();renderHome()" style="background:none;border:none;color:var(--accent);font-size:14px;font-weight:600;padding:4px 0;cursor:pointer;display:flex;align-items:center;gap:4px">
        <span style="font-size:17px;line-height:1">‹</span> All Routes
      </button>
    </div>`;
    // Show all stops for this filter in window-time order (already sorted in allStops)
    const sorted = [...visibleStops].sort((a, b) => (a._displayNum || 0) - (b._displayNum || 0));
    if (sorted.length === 0) {
      h += `<div style="text-align:center;padding:32px 0;color:var(--gray-400);font-size:14px">No stops in this route.</div>`;
    } else {
      // Banner for upcoming-route preview
      if (isUpcomingView) {
        const uRoute = upcomingRoutes.find(r => r.id === activeRouteFilter);
        const tmpl = uRoute?.route_templates;
        const windowRange = fmtWindowRange(tmpl);
        const windowLabel = windowRange ? windowRange : 'later today';
        h += `<div style="background:#fef9c3;border:1px solid #fde047;border-radius:10px;padding:11px 14px;margin-bottom:14px;font-size:13px;color:#713f12;font-weight:600">
          🕐 Planning view — this route runs ${windowLabel}. Stops shown for reference only.
        </div>`;

        // ── Rack Check ──────────────────────────────────────────────────────
        // Show only for delivery stops — driver needs to physically verify
        // each bag is on the rack before leaving the processing center.
        // Pickup stops are excluded (those bags don't exist yet).
        const delivStops = sorted.filter(s => s.stop_type === 'delivery');
        if (delivStops.length > 0) {
          // Load saved state from localStorage for this route+day
          _rackCheckState = _rackCheckLoad(activeRouteFilter);
          const checkedCount = delivStops.filter(s => _rackCheckState[s.id] === 'ok').length;
          const missingCount = delivStops.filter(s => _rackCheckState[s.id] === 'missing').length;
          const allChecked   = checkedCount + missingCount === delivStops.length;

          // Summary banner
          if (allChecked && missingCount === 0) {
            h += `<div class="rack-all-good">✅ All ${checkedCount} bag${checkedCount !== 1 ? 's' : ''} confirmed on rack — ready to go!</div>`;
          } else if (allChecked && missingCount > 0) {
            h += `<div class="rack-has-missing">⚠️ ${missingCount} bag${missingCount !== 1 ? 's' : ''} missing — contact dispatch before leaving!</div>`;
          }

          // Checklist rows
          let rackRows = '';
          delivStops.forEach(s => {
            const cust    = s.orders?.customers;
            const custName = cust ? `${cust.first_name_cache||''} ${cust.last_name_cache||''}`.trim() : 'Customer';
            const orderNum = s.orders?.order_number ? `#${s.orders.order_number}` : '';
            const state    = _rackCheckState[s.id] || null;
            rackRows += `
              <div class="rack-check-row">
                <div class="rack-check-info">
                  <div class="rack-check-name">${custName}</div>
                  ${orderNum ? `<div class="rack-check-order">${orderNum}</div>` : ''}
                </div>
                <div class="rack-check-btns">
                  <button class="rack-btn rack-btn-ok${state === 'ok' ? ' active' : ''}"
                    onclick="event.stopPropagation();rackCheckToggle('${s.id}','ok')">✓ On Rack</button>
                  <button class="rack-btn rack-btn-miss${state === 'missing' ? ' active' : ''}"
                    onclick="event.stopPropagation();rackCheckToggle('${s.id}','missing')">Missing</button>
                </div>
              </div>`;
          });
          h += `<div class="rack-check-wrap">
            <div class="rack-check-header">
              <span class="rack-check-title">📋 Bag Check</span>
              <span class="rack-check-progress">${checkedCount + missingCount} of ${delivStops.length} checked</span>
            </div>
            ${rackRows}
          </div>`;
        }
        // ── End Rack Check ──────────────────────────────────────────────────
      }
      sorted.forEach((stop, i) => { stop._displayNum = i + 1; h += renderStopCard(stop); });
    }
    // "Route complete" banner when all done (skip for upcoming routes)
    if (!isUpcomingView && total > 0 && done === total) {
      h += `<div class="completed-banner" style="margin-top:16px">All stops done — great work!</div>`;
    }
  } else if (todayRoutes.length > 1) {
    // Unfiltered multi-route: group by route with section headers
    let firstSection = true;
    todayRoutes.forEach((route) => {
      const rStops = allStops
        .filter(s => s.route_id === route.id)
        .sort((a, b) => (a._displayNum || 0) - (b._displayNum || 0));
      if (!rStops.length) return;
      const rDone = rStops.filter(s => s.status === 'complete' || s.status === 'skipped' || s.status === 'failed').length;
      if (!firstSection) h += '<div style="height:10px"></div>';
      firstSection = false;
      const carryTag = route._carryForward ? ' <span style="font-size:10px;font-weight:700;color:#dc2626;background:#fef2f2;padding:2px 6px;border-radius:4px;margin-left:4px">OVERDUE</span>' : '';
      h += `<div class="stop-section-hdr">
        <span class="stop-section-pill" style="background:#f3f0ff;color:#7c3aed"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#7c3aed;margin-right:5px;vertical-align:middle"></span>${route.name}${carryTag}</span>
        <span class="stop-section-count">${rDone} of ${rStops.length} done</span>
      </div>`;
      rStops.forEach((stop, i) => { stop._displayNum = i + 1; h += renderStopCard(stop); });
    });
    // Extra Stops section (reassigned) at the bottom
    const extraStops = allStops.filter(s => s._reassigned).sort((a, b) => (a._displayNum || 0) - (b._displayNum || 0));
    if (extraStops.length > 0) {
      const eDone = extraStops.filter(s => s.status === 'complete' || s.status === 'skipped' || s.status === 'failed').length;
      h += `<div style="height:10px"></div>
        <div class="stop-section-hdr">
          <span class="stop-section-pill" style="background:#f5f3ff;color:#7c3aed"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#7c3aed;margin-right:5px;vertical-align:middle"></span>Extra Stops</span>
          <span class="stop-section-count">${eDone} of ${extraStops.length} done</span>
        </div>`;
      extraStops.forEach((stop, i) => { stop._displayNum = i + 1; h += renderStopCard(stop); });
    }
  } else {
    // Single route: all stops in window-time order (already sorted in allStops)
    const sorted = [...visibleStops].sort((a, b) => (a._displayNum || 0) - (b._displayNum || 0));
    sorted.forEach((stop, i) => { stop._displayNum = i + 1; h += renderStopCard(stop); });
  }

  h += '</div>';
  // Preserve scroll position across re-renders (e.g. rack check taps, realtime updates)
  const _prevScroll = body.scrollTop;
  body.innerHTML = h;
  if (_prevScroll > 0) body.scrollTop = _prevScroll;
}

  mail:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`,
  van:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="10" width="22" height="10" rx="2"/><path d="M5 10V7a3 3 0 013-3h8a3 3 0 013 3v3"/><circle cx="7.5" cy="20" r="1.5" fill="currentColor" stroke="none"/><circle cx="16.5" cy="20" r="1.5" fill="currentColor" stroke="none"/></svg>`,
  chart:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
  card:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>`,
  msg:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>`,
  camera:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>`,
  check:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
};
function icon(name) { return `<span class="dicon">${ICONS[name]||''}</span>`; }

/* ──────────────────────────────
   STOP DETAIL
────────────────────────────── */
function openStop(stopId) {
  currentStopId = stopId;
  const stop = allStops.find(s => s.id === stopId);
  if (!stop) return;
  // Always start at Phase 1 — driver taps "I've Arrived" to advance to bags/notes
  currentStopPhase = 1;
  currentStopSubPhase = 1;
  adjustedBagCount = null;
  draftNotes = null;
  renderStopDetail(stop);
  showScreen('stop');
}

function renderStopDetail(stopOrId) {
  // Accept either a stop object or a stop ID string (realtime handlers pass IDs)
  const stop = typeof stopOrId === 'string' ? allStops.find(s => s.id === stopOrId) : stopOrId;
  if (!stop) return;
  const addr  = stop._addr;
  const order = stop.orders;
  const cust  = order?.customers;
  const svc   = order?.services;
  const isDone    = stop.status === 'complete';
  const isSkip    = stop.status === 'skipped';
  const isFailed  = stop.status === 'failed';
  const isEnRoute = stop.status === 'en_route';
  const isPickup  = stop.stop_type === 'pickup';
  const custName  = cust ? `${cust.first_name_cache||''} ${cust.last_name_cache||''}`.trim() : 'Customer';
  const hasPhone  = !!cust?.phone_cache;

  // Update header with type-colored eyebrow
  const eyebrowEl = document.getElementById('stop-eyebrow');
  eyebrowEl.textContent = `${stop.stop_type.toUpperCase()} · STOP ${stop._displayNum || stop.stop_number}`;
  eyebrowEl.style.color = isPickup ? '#93c5fd' : '#6ee7b7';
  eyebrowEl.style.opacity = '1';
  document.getElementById('stop-title').textContent = custName || 'Customer';

  const body = document.getElementById('stop-body');
  let h = '';

  // ── DONE banner ──
  if (isDone) {
    const photoHtml = stop.proof_photo_url
      ? `<img src="${stop.proof_photo_url}" style="width:80px;height:80px;border-radius:8px;object-fit:cover;border:2px solid #6ee7b7;margin-top:8px" alt="Proof photo">`
      : '';
    h += `<div style="padding:14px 20px 4px">
      <div class="completed-banner" style="flex-direction:column;align-items:center">
        <div>${isPickup ? 'Picked Up' : 'Delivered'}${stop.completed_at ? ' at ' + fmtTime(stop.completed_at) : ''}</div>
        ${photoHtml}
      </div>
    </div>`;
  }
  if (isSkip) {
    h += `<div style="padding:14px 20px 4px">
      <div class="completed-banner" style="background:#fef3c7;color:#92400e">Skipped</div>
    </div>`;
  }
  if (isFailed) {
    h += `<div style="padding:14px 20px 4px">
      <div class="completed-banner" style="background:#fee2e2;color:#991b1b">Pickup Failed — Admin will reschedule</div>
    </div>`;
  }

  // ── Info section — spaced out for mobile readability ──
  h += `<div class="stop-info-section">`;

  // Address card
  h += `<div class="stop-info-card">
    <div class="stop-info-label">Address</div>
    <div class="stop-info-value">${fmtAddr(addr)}</div>
  </div>`;

  // Instructions callout (prominent yellow card)
  if (addr?.delivery_instructions) {
    h += `<div class="stop-instructions-card">
      <div class="stop-info-label" style="color:#92400e">📌 Instructions</div>
      <div class="stop-info-value" style="color:#78350f">${addr.delivery_instructions}</div>
    </div>`;
  }

  // Bags + preferences
  const bagText = `${order?.total_bags||1} bag${(order?.total_bags||1)!==1?'s':''} expected`;
  const prefHtml = renderPrefTags(cust?.preferences);
  h += `<div class="stop-info-card">
    <div class="stop-info-label">Order</div>
    <div class="stop-info-value">${bagText}</div>
    ${prefHtml || ''}
  </div>`;

  // Call / Text CTA buttons (only for active stops with a phone)
  if (hasPhone && !isDone && !isSkip && !isFailed) {
    h += `<div style="display:flex;gap:10px;padding:0 20px;">
      <a href="tel:${cust.phone_cache}" class="cta-contact">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
        Call Customer
      </a>
      <button onclick="openCustomerThread('${stop.orders?.customer_id}')" class="cta-contact">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Send Text
      </button>
    </div>`;
  }

  h += `</div>`; // end stop-info-section

  // ── Active stop phases ──
  if (!isDone && !isSkip && !isFailed) {

    if (currentStopPhase === 1) {
      // ════ PHASE 1: Pre-arrival ════
      // Two distinct flags — splitting these prevents the "Customer notified" chip from
      // lying when the driver tapped "I'm already here" (which sets en_route locally
      // but does NOT send an SMS — only sendOnMyWay() stamps on_my_way_sent_at).
      const sentSms = !!stop.on_my_way_sent_at;
      const arrivedOrSent = sentSms || isEnRoute;
      const mapsHref = stop._addr ? mapsLink(stop._addr) : null;
      h += `<div class="phase1-actions">`;
      if (!arrivedOrSent) {
        h += `<button class="btn-notify-big" id="btn-notify-cust" onclick="sendOnMyWay('${stop.id}')">
          I'm On My Way
        </button>`;
        if (mapsHref) {
          h += `<a href="${mapsHref}" target="_blank" class="btn-maps" style="margin-top:10px;text-decoration:none">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
            Open in Maps
          </a>`;
        }
        h += `<button class="btn-arrive-text" onclick="arrivedAtStop('${stop.id}')">I'm already here</button>`;
      } else {
        // En route OR already-arrived state. Only show the "Customer notified" chip
        // when the SMS was actually sent — never lie when the driver chose to skip it.
        if (sentSms) {
          h += `<div class="enroute-notified-chip">✓&nbsp; Customer notified</div>`;
        }
        if (mapsHref) {
          h += `<a href="${mapsHref}" target="_blank" class="btn-maps" style="margin-top:10px;text-decoration:none">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
            Open in Maps
          </a>`;
        }
        h += `<button class="btn-arrived-cta" onclick="arrivedAtStop('${stop.id}')">I've Arrived</button>`;
      }
      h += `</div>`;

    } else {
      // ════ PHASE 2: At-stop ════
      const notified = !!stop.on_my_way_sent_at; // only true if SMS was actually sent
      const bagCount = adjustedBagCount ?? (order?.total_bags || 1);
      if (adjustedBagCount === null) adjustedBagCount = order?.total_bags || 1;
      const expectedBags = order?.total_bags || 1;

      // Arrival chip (shown on both sub-phases) + small navigate link
      const p2mapsHref = stop._addr ? mapsLink(stop._addr) : null;
      const navLink = p2mapsHref
        ? `<a href="${p2mapsHref}" target="_blank" style="font-size:12px;font-weight:700;color:var(--accent);text-decoration:none;white-space:nowrap">↗ Maps</a>`
        : '';

      if (currentStopSubPhase === 1) {
        // ── SUB-PHASE 1: Confirm bags + notes ──

        // Bag count — editable on pickup, locked on delivery
        if (isPickup) {
          h += `<div class="dsection">
            <div class="dsection-title" style="display:flex;align-items:center;justify-content:space-between">Bags to pick up${navLink}</div>
            <div class="bag-stepper-wrap">
              <div class="bag-stepper">
                <button class="bag-stepper-btn" id="bag-minus-btn" onclick="adjustBags(-1)" ${bagCount <= 0 ? 'disabled' : ''}>−</button>
                <div class="bag-stepper-count" id="bag-count-val">${bagCount}</div>
                <button class="bag-stepper-btn" onclick="adjustBags(1)">+</button>
              </div>
              <div class="bag-expected">Expected: ${expectedBags} bag${expectedBags !== 1 ? 's' : ''}</div>
            </div>
          </div>`;
        } else {
          h += `<div class="dsection">
            <div class="dsection-title" style="display:flex;align-items:center;justify-content:space-between">Bags to deliver${navLink}</div>
            <div class="bag-stepper-wrap">
              <div class="bag-stepper" style="opacity:0.6;pointer-events:none">
                <button class="bag-stepper-btn" disabled>−</button>
                <div class="bag-stepper-count">${bagCount}</div>
                <button class="bag-stepper-btn" disabled>+</button>
              </div>
              <div class="bag-expected">Locked at processing</div>
            </div>
          </div>`;
        }

        // Driver notes
        h += `<div class="dsection">
          <div class="dsection-title">Driver Notes</div>
          <textarea class="notes-box" id="stop-notes" placeholder="Add notes for this stop…">${draftNotes !== null ? draftNotes : (stop.driver_notes || '')}</textarea>
        </div>`;

        // NEXT button
        h += `<div class="detail-actions">
          <button class="btn-complete" id="btn-next-subphase" onclick="nextSubPhase('${stop.id}')">Continue</button>
        </div>`;

      } else {
        // ── SUB-PHASE 2: Photo + complete ──

        // Photo capture
        const hasPhoto = !!stop.proof_photo_url;
        const photoSkipped = _photoSkippedStopIds.has(stop.id);
        const canComplete = hasPhoto || photoSkipped;  // either real photo OR explicit skip
        const photoLabel = isPickup ? 'Pickup Photo' : 'Delivery Photo';
        h += `<div class="dsection">
          <div class="dsection-title">${photoLabel}</div>
          <div class="photo-row">
            ${hasPhoto ? `<img class="photo-thumb show" id="photo-thumb" src="${stop.proof_photo_url}" alt="Proof photo">` : `<img class="photo-thumb" id="photo-thumb" src="" alt="Proof photo">`}
            <button class="btn-camera ${hasPhoto ? 'has-photo' : ''}" id="btn-camera" onclick="document.getElementById('photo-input').click()">
              ${hasPhoto ? 'Photo Taken' : 'Take Photo'}
            </button>
          </div>
          <div class="photo-uploading" id="photo-uploading">Compressing…</div>
          <input class="photo-input" type="file" accept="image/*" capture="environment" id="photo-input" onchange="handlePhoto(this, '${stop.id}')">
          ${!hasPhoto && !photoSkipped ? `
            <div style="text-align:center;margin-top:10px">
              <button onclick="confirmSkipPhoto('${stop.id}')"
                style="background:none;border:none;color:var(--muted);font-size:13px;
                       text-decoration:underline;cursor:pointer;padding:6px 10px">
                Skip photo (low signal / can't capture)
              </button>
            </div>` : ''}
          ${!hasPhoto && photoSkipped ? `
            <div style="margin-top:10px;padding:10px 14px;background:#fef3c7;color:#92400e;
                        border-radius:8px;font-size:13px;display:flex;align-items:center;
                        justify-content:space-between;gap:10px">
              <span>✗ Photo will be skipped</span>
              <button onclick="undoSkipPhoto('${stop.id}')"
                style="background:none;border:none;color:#92400e;text-decoration:underline;
                       font-size:13px;font-weight:600;cursor:pointer;padding:0">
                Undo
              </button>
            </div>` : ''}
        </div>`;

        // Complete + Skip (complete is locked until photo is taken OR explicitly skipped)
        const cls   = isPickup ? '' : 'delivery';
        const label = isPickup ? 'Mark Picked Up' : 'Mark Delivered';
        h += `<div class="detail-actions">
          <button class="btn-complete ${cls}" id="btn-do-complete" onclick="completeStop('${stop.id}', '${stop.stop_type}')" ${!canComplete ? 'disabled' : ''}>${label}</button>
          ${!canComplete ? `<div style="text-align:center;font-size:13px;color:var(--muted);margin-top:8px">Take a photo or tap "Skip photo" to continue</div>` : ''}
          <button class="btn-back-subphase" onclick="prevSubPhase('${stop.id}')">← Back</button>
          <div style="height:1px;background:var(--border);margin:4px 0 2px"></div>
          <button class="btn-skip-stop" onclick="cantCompleteStop('${stop.id}')">Can't Complete</button>
        </div>`;
      }
    }

  } else if (isDone || isSkip || isFailed) {
    // Read-only notes if any
    if (stop.driver_notes) {
      h += `<div class="dsection">
        <div class="dsection-title">Driver Notes</div>
        <div style="font-size:14px;color:var(--gray);padding:10px 14px;background:var(--bg);border-radius:10px">${stop.driver_notes}</div>
      </div>`;
    }
  }

  // ── Next stop nudge (after done) — respects activeRouteFilter ──
  if (isDone) {
    const candidates = allStops.filter(s => s.id !== stop.id && (s.status === 'pending' || s.status === 'en_route'));
    const next = (() => {
      if (activeRouteFilter === 'extra') return candidates.filter(s => s._reassigned).sort((a,b) => (a._displayNum||0) - (b._displayNum||0))[0] || null;
      if (activeRouteFilter) return candidates.filter(s => s.route_id === activeRouteFilter).sort((a,b) => (a._displayNum||0) - (b._displayNum||0))[0] || null;
      return candidates.sort((a,b) => (a._displayNum||0) - (b._displayNum||0))[0] || null;
    })();
    if (next) {
      const na = next._addr;
      const nc = next.orders?.customers;
      const nn = nc ? `${nc.first_name_cache||''} ${nc.last_name_cache||''}`.trim() : 'Customer';
      h += `<div style="padding:0 20px 16px">
        <div class="next-stop-nudge">
          <div class="nsn-info">
            <div class="nsn-label">Next Stop · ${(next.stop_type||'').toUpperCase()} ${next.stop_number}</div>
            <div class="nsn-title">${nn}</div>
            <div class="nsn-addr">${na ? `${na.line1}, ${na.city}` : 'No address'}</div>
          </div>
          <button class="btn-nsn" onclick="openStop('${next.id}')">Go →</button>
        </div>
      </div>`;
    } else {
      h += `<div style="padding:0 20px 16px"><div class="completed-banner">All stops complete — great work!</div></div>`;
    }
  }

  body.innerHTML = h;
  body.scrollTop = 0;
}

function renderPrefTags(prefs) {
  if (!prefs || !Object.keys(prefs).length) return '';
  const tags = [];
  if (prefs.no_bleach)          tags.push('No Bleach');
  if (prefs.hang_dry)           tags.push('Hang Dry');
  if (prefs.softener === false) tags.push('No Softener');
  if (prefs.detergent)          tags.push(prefs.detergent);
  if (prefs.water_temp)         tags.push(prefs.water_temp);
  if (!tags.length) return '';
  return `<div class="drow">${icon('star')}<div class="pref-tags">${tags.map(t=>`<span class="pref-tag">${t}</span>`).join('')}</div></div>`;
}

/* ──────────────────────────────
   ON MY WAY
────────────────────────────── */
let _onMyWaySending = false;
async function sendOnMyWay(stopId) {
  if (_onMyWaySending) return; // debounce: prevent double-tap
  _onMyWaySending = true;
  const btn = document.getElementById('btn-notify-cust');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }

  const driverName = currentProfile?.first_name || 'Your driver';

  try {
    const { data: { session } } = await db.auth.getSession();
    const res = await fetch(`${SUPA_URL}/functions/v1/notify-on-my-way`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': session ? `Bearer ${session.access_token}` : `Bearer ${SUPA_KEY}`,
      },
      body: JSON.stringify({ stopId, driverName }),
    });
    const result = await res.json();
    if (!res.ok) throw new Error(result.error || result.message || `Server error ${res.status}`);

    // Update local stop state
    const idx = allStops.findIndex(s => s.id === stopId);
    if (idx >= 0) {
      allStops[idx].on_my_way_sent_at = new Date().toISOString();
      allStops[idx].status = 'en_route';
    }

    // Stay on Phase 1 — driver must tap "I've Arrived" to proceed to bags/notes
    const stop = allStops.find(s => s.id === stopId);

    const smsOk = result.sms?.ok;
    if (smsOk) {
      toast('Customer notified ✓');
    } else if (result.sms?.reason === 'twilio_not_configured') {
      toast('Status updated · Now navigate');
    } else if (result.sms?.reason === 'no_phone') {
      toast('No phone on file · Now navigate');
    } else {
      toast('En route');
    }

    if (stop) renderStopDetail(stop);
    renderRoute();
  } catch (e) {
    console.error('sendOnMyWay error:', e);
    toast('Could not update status — check connection');
    if (btn) { btn.disabled = false; btn.textContent = 'Notify Customer'; }
  } finally {
    _onMyWaySending = false;
  }
}

/* ──────────────────────────────
   ARRIVED AT STOP (skip notification)
────────────────────────────── */
async function arrivedAtStop(stopId) {
  currentStopPhase = 2;
  currentStopSubPhase = 1;
  draftNotes = null;
  const idx = allStops.findIndex(s => s.id === stopId);
  if (idx >= 0) {
    const prevStatus = allStops[idx].status;
    allStops[idx].status = 'en_route';
    if (prevStatus !== 'en_route') {
      // Best-effort DB update — non-blocking
      db.from('route_stops').update({ status: 'en_route' }).eq('id', stopId).catch(() => {});
    }
    if (adjustedBagCount === null) adjustedBagCount = allStops[idx]?.orders?.total_bags || 1;
  }
  const stop = allStops.find(s => s.id === stopId);
  if (stop) renderStopDetail(stop);
  renderRoute();
}

/* ──────────────────────────────
   SUB-PHASE ADVANCE (bags+notes → photo+complete)
────────────────────────────── */
function nextSubPhase(stopId) {
  // Capture notes before the textarea disappears on re-render
  const notesEl = document.getElementById('stop-notes');
  if (notesEl) draftNotes = notesEl.value.trim() || null;
  currentStopSubPhase = 2;
  const stop = allStops.find(s => s.id === stopId);
  if (stop) renderStopDetail(stop);
  document.getElementById('stop-body').scrollTop = 0;
}

/* ──────────────────────────────
   BACK: PHOTO → BAGS
────────────────────────────── */
function prevSubPhase(stopId) {
  currentStopSubPhase = 1;
  const stop = allStops.find(s => s.id === stopId);
  if (stop) renderStopDetail(stop);
  document.getElementById('stop-body').scrollTop = 0;
}

/* ──────────────────────────────
   BAG COUNT STEPPER
────────────────────────────── */
function adjustBags(delta) {
  adjustedBagCount = Math.max(0, (adjustedBagCount ?? 1) + delta);
  const el = document.getElementById('bag-count-val');
  if (el) el.textContent = adjustedBagCount;
  const minusBtn = document.getElementById('bag-minus-btn');
  if (minusBtn) minusBtn.disabled = adjustedBagCount <= 0;
}

/* ──────────────────────────────
   PHOTO CAPTURE
────────────────────────────── */
/* ──────────────────────────────
   SKIP PHOTO (driver explicitly chooses to complete without a photo —
   typically when cell signal is too weak or the camera won't cooperate)
────────────────────────────── */
function confirmSkipPhoto(stopId) {
  const ok = confirm(
    'Skip the photo for this stop?\n\n' +
    'The pickup will be recorded without proof. Use this only when you cannot take a photo ' +
    '(no signal, camera issue, etc.). Tap "Take Photo" any time to capture one instead.'
  );
  if (!ok) return;
  _photoSkippedStopIds.add(stopId);
  const stop = allStops.find(s => s.id === stopId);
  if (stop) renderStopDetail(stop);
  toast('Photo skipped — you can now mark the stop');
}

function undoSkipPhoto(stopId) {
  _photoSkippedStopIds.delete(stopId);
  const stop = allStops.find(s => s.id === stopId);
  if (stop) renderStopDetail(stop);
}

async function handlePhoto(input, stopId) {
  const file = input.files[0];
  if (!file) return;

  // If the driver had previously tapped "Skip photo" but now took one, clear the skip flag
  // so the photo is the source of truth (don't write photo_skipped_at on this completion).
  _photoSkippedStopIds.delete(stopId);

  const uploading = document.getElementById('photo-uploading');
  const thumb     = document.getElementById('photo-thumb');
  const camBtn    = document.getElementById('btn-camera');
  if (camBtn) camBtn.textContent = 'Processing…';

  // 1. Show local preview immediately
  const localDataUrl = await new Promise(r => {
    const reader = new FileReader();
    reader.onload = e => r(e.target.result);
    reader.readAsDataURL(file);
  });
  if (thumb) { thumb.src = localDataUrl; thumb.classList.add('show'); }

  // 2. Compress the image (typically 80-90% smaller)
  if (uploading) { uploading.textContent = 'Compressing…'; uploading.classList.add('show'); }
  const compressed = await compressPhoto(file);
  const sizeMb = (sz) => (sz / 1024 / 1024).toFixed(1);
  console.log(`Photo compressed: ${sizeMb(file.size)}MB → ${sizeMb(compressed.size)}MB`);

  // 3. Mark photo as taken locally — unlock Complete button right away
  const idx = allStops.findIndex(s => s.id === stopId);
  if (idx >= 0) allStops[idx].proof_photo_url = localDataUrl; // local data URL as placeholder
  if (camBtn) { camBtn.textContent = 'Photo Taken'; camBtn.classList.add('has-photo'); }
  if (uploading) uploading.classList.remove('show');

  const completeBtn = document.getElementById('btn-do-complete');
  if (completeBtn) {
    completeBtn.disabled = false;
    const hint = completeBtn.nextElementSibling;
    if (hint && hint.style.textAlign === 'center') hint.remove();
  }
  toast('Photo saved — uploading in background');

  // 4. Enqueue for background upload (handles retry + offline)
  await enqueuePhoto(stopId, compressed, localDataUrl);
}

/* ──────────────────────────────
   UNDO SYSTEM
────────────────────────────── */
function showUndoBar(message, undoData) {
  clearUndo();
  pendingUndo = undoData;

  const bar  = document.getElementById('undo-bar');
  const msg  = document.getElementById('undo-msg');
  const cntd = document.getElementById('undo-countdown');
  msg.textContent = message;
  bar.classList.add('show');

  let secs = 12;
  cntd.textContent = `Undo in ${secs}s`;
  undoCountTimer = setInterval(() => {
    secs--;
    cntd.textContent = secs > 0 ? `Undo in ${secs}s` : '';
    if (secs <= 0) clearUndo();
  }, 1000);

  undoTimer = setTimeout(() => {
    clearUndo();
    pendingUndo = null;
  }, 12000);
}

function clearUndo() {
  clearTimeout(undoTimer);
  clearInterval(undoCountTimer);
  document.getElementById('undo-bar').classList.remove('show');
}

async function triggerUndo() {
  if (!pendingUndo) return;
  clearUndo();
  const { type, stopId, prevStopStatus, prevOrderStatus, prevDriverNotes } = pendingUndo;
  pendingUndo = null;

  showLoading(true);
  try {
    // Reverse the stop status (and restore driver_notes if we appended a reason)
    await db.from('route_stops').update({
      status: prevStopStatus,
      completed_at: null,
      actual_arrival: null,
      on_my_way_sent_at: null,
      ...(prevDriverNotes !== undefined ? { driver_notes: prevDriverNotes } : {}),
    }).eq('id', stopId);

    // Reverse the order status
    const stop = allStops.find(s => s.id === stopId);
    if (stop?.orders?.id && prevOrderStatus) {
      const clearField = type === 'complete'
        ? (stop.stop_type === 'pickup' ? { actual_pickup_at: null } : { actual_delivery_at: null })
        : {};
      await db.from('orders').update({ status: prevOrderStatus, cancelled_by: null, driver_skip_reason: null, ...clearField }).eq('id', stop.orders.id);
      stop.orders.status = prevOrderStatus;
    }

    // Update route progress
    const idx = allStops.findIndex(s => s.id === stopId);
    if (idx >= 0) {
      allStops[idx] = { ...allStops[idx], status: prevStopStatus, completed_at: null, on_my_way_sent_at: null };
      // Reset phase so stop detail re-renders from Phase 1
      if (stopId === currentStopId) {
        currentStopPhase = 1;
        currentStopSubPhase = 1;
        adjustedBagCount = null;
        draftNotes = null;
      }
    }

    const routeId = stop?.route_id;
    const route   = todayRoutes.find(r => r.id === routeId);
    if (route) {
      const newDone = allStops.filter(s => s.route_id === routeId && s.status === 'complete').length;
      await db.from('routes').update({
        completed_stops: newDone,
        status: 'in_progress',
        completed_at: null,
      }).eq('id', routeId);
      route.completed_stops = newDone;
      route.status = 'in_progress';
    }

    toast('Action undone');
    const updated = allStops.find(s => s.id === stopId);
    if (updated) renderStopDetail(updated);
    renderHome();
  } catch (e) {
    console.error('Undo error:', e);
    toast('Could not undo — refresh and try again');
  } finally {
    showLoading(false);
  }
}

/* ──────────────────────────────
   COMPLETE STOP
────────────────────────────── */
async function completeStop(stopId, stopType) {
  const btn = document.getElementById('btn-do-complete');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  // Notes are captured into draftNotes when driver taps Next; textarea is gone by this point
  const notes = draftNotes !== null ? draftNotes : (document.getElementById('stop-notes')?.value?.trim() || null);
  const now   = new Date().toISOString();
  const stop  = allStops.find(s => s.id === stopId);
  if (!stop) { toast('Stop no longer exists'); goTo('route'); return; }
  // Safety guard: either a proof photo OR an explicit "Skip photo" tap is required.
  // Accepts remote URLs and local data URLs (queued for background upload).
  const hasLocalOrRemotePhoto = stop.proof_photo_url || _photoQueue.some(q => q.stopId === stopId);
  const photoSkipped = _photoSkippedStopIds.has(stopId);
  if (!hasLocalOrRemotePhoto && !photoSkipped) {
    toast('Take a photo or tap "Skip photo" to continue');
    // Re-enable the button so the driver can act — was a 1-char typo (`true` should be `false`)
    if (btn) { btn.disabled = false; btn.textContent = stopType === 'pickup' ? 'Mark Picked Up' : 'Mark Delivered'; }
    return;
  }
  const prevOrderStatus = stop?.orders?.status || null;

  const updatePayload = {
    status: 'complete', completed_at: now, actual_arrival: now, driver_notes: notes
  };
  // If driver explicitly chose to skip the photo, stamp it so admin can see (📷✗ badge on the stop card)
  if (photoSkipped && !hasLocalOrRemotePhoto) {
    updatePayload.photo_skipped_at = now;
  }
  const { error: stopErr } = await db.from('route_stops').update(updatePayload).eq('id', stopId);

  if (stopErr) {
    toast('Error: ' + stopErr.message);
    if (btn) { btn.disabled = false; btn.textContent = stopType === 'pickup' ? 'Mark Picked Up' : 'Mark Delivered'; }
    return;
  }

  // Update local state first (needed to compute route progress accurately)
  const idx = allStops.findIndex(s => s.id === stopId);
  if (idx >= 0) {
    allStops[idx] = {
      ...allStops[idx],
      status: 'complete', completed_at: now, driver_notes: notes,
      ...(updatePayload.photo_skipped_at ? { photo_skipped_at: updatePayload.photo_skipped_at } : {})
    };
  }
  // Clear the skip flag — stop is done, the in-memory flag is no longer needed
  _photoSkippedStopIds.delete(stopId);

  // Build parallel DB update promises
  const updatePromises = [];

  // Order status update (includes adjusted bag count if changed)
  let newStatus = null;
  if (stop?.orders?.id) {
    newStatus = stopType === 'pickup' ? 'picked_up' : 'delivered';
    const timeField = stopType === 'pickup' ? 'actual_pickup_at' : 'actual_delivery_at';
    const orderUpdate = { status: newStatus, [timeField]: now };
    const actualBags = adjustedBagCount !== null ? adjustedBagCount : (stop.orders.total_bags || 1);
    if (actualBags !== stop.orders.total_bags) {
      orderUpdate.total_bags = actualBags;
      // Update local cache too
      const si = allStops.findIndex(s => s.id === stopId);
      if (si >= 0 && allStops[si].orders) allStops[si].orders.total_bags = actualBags;
    }
    updatePromises.push(
      db.from('orders').update(orderUpdate).eq('id', stop.orders.id)
    );
    stop.orders.status = newStatus;
  }

  // Route progress update
  const routeId = stop?.route_id;
  const route   = todayRoutes.find(r => r.id === routeId);
  if (route) {
    const newDone    = allStops.filter(s => s.route_id === routeId && s.status === 'complete').length;
    const routeTotal = allStops.filter(s => s.route_id === routeId).length;
    const allDone    = newDone >= routeTotal;
    updatePromises.push(
      db.from('routes').update({
        completed_stops: newDone,
        status: allDone ? 'complete' : 'in_progress',
        started_at:   route.started_at || now,
        completed_at: allDone ? now : null,
      }).eq('id', routeId)
    );
    route.completed_stops = newDone;
    route.status = allDone ? 'complete' : 'in_progress';
    if (!route.started_at) route.started_at = now;
    // Stop GPS tracking when all routes for today are complete
    if (allDone) {
      const anyActive = todayRoutes.some(r => r.status !== 'complete');
      if (!anyActive) stopGpsTracking();
    }
  }

  // Fire both DB writes in parallel
  try { await Promise.all(updatePromises); } catch(e) { console.warn('Partial update error:', e); }

  // Fire SMS notification (best-effort, non-blocking)
  if (stop?.orders?.id && newStatus) {
    const smsEvent = stopType === 'pickup' ? 'picked_up' : 'delivered';
    fetch(`${SUPA_URL}/functions/v1/send-order-notification`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPA_KEY}` },
      body: JSON.stringify({ orderId: stop.orders.id, event: smsEvent })
    }).catch(() => {});
  }

  // Re-render with updated state
  const updated = allStops.find(s => s.id === stopId);
  if (updated) renderStopDetail(updated);
  renderHome();

  // Undo bar removed — drivers were instinctively tapping it, reversing completed stops

  // Re-optimize remaining stops from driver's current location (fire-and-forget)
  if (routeId && route?.status !== 'complete') {
    reoptimizeRoute(routeId);
  }
}

/* ──────────────────────────────
   CAN'T COMPLETE (unified skip/fail)
────────────────────────────── */
let _cantCompleteResolve = null;
function showCantComplete() {
  return new Promise(resolve => {
    _cantCompleteResolve = resolve;
    document.getElementById('cant-complete-overlay').classList.add('show');
  });
}
function resolveCantComplete(reason) {
  document.getElementById('cant-complete-overlay').classList.remove('show');
  if (_cantCompleteResolve) { _cantCompleteResolve(reason); _cantCompleteResolve = null; }
}

const CANT_COMPLETE_LABELS = {
  bags_not_out: 'Bags not out',
  cant_access: "Can't access",
  customer_not_home: 'Customer not home',
  customer_requested_skip: 'Customer requested skip',
  other: 'Other',
};

async function cantCompleteStop(stopId) {
  const reason = await showCantComplete();
  if (!reason) return; // user cancelled

  const stop = allStops.find(s => s.id === stopId);
  if (!stop) { toast('Stop no longer exists'); goTo('route'); return; }
  const prevStopStatus = stop.status || 'pending';
  const prevOrderStatus = stop?.orders?.status || null;
  const prevDriverNotes = stop.driver_notes || null;
  const isPickup = stop.stop_type === 'pickup';

  // Mark route stop as skipped (route_stops constraint allows 'skipped' but not 'failed')
  await db.from('route_stops').update({
    status: 'skipped',
    driver_notes: (stop.driver_notes ? stop.driver_notes + ' | ' : '') + 'Can\'t complete: ' + CANT_COMPLETE_LABELS[reason],
  }).eq('id', stopId);

  const idx = allStops.findIndex(s => s.id === stopId);
  if (idx >= 0) {
    allStops[idx].status = 'skipped';
    if (stop?.orders?.id) {
      // Map the order status + notification event to the correct stop type.
      // Pickup failures → pickup_failed, delivery failures → delivery_failed.
      const failedStatus = isPickup ? 'pickup_failed' : 'delivery_failed';
      const failedEvent  = isPickup ? 'pickup_failed' : 'delivery_failed';

      await db.from('orders').update({
        status: failedStatus,
        cancelled_by: 'driver',
        driver_skip_reason: reason,
      }).eq('id', stop.orders.id);
      allStops[idx].orders.status = failedStatus;

      // Notify customer via SMS (matching template)
      try {
        await fetch(`${SUPA_URL}/functions/v1/send-order-notification`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPA_KEY}` },
          body: JSON.stringify({ orderId: stop.orders.id, event: failedEvent })
        });
      } catch(e) { console.warn('Notification failed:', e); }
    }
  }

  goTo('route');

  showUndoBar('Stop incomplete — ' + CANT_COMPLETE_LABELS[reason], {
    type: 'skip',
    stopId,
    prevStopStatus,
    prevOrderStatus,
    prevDriverNotes,
  });

  // Re-optimize remaining stops from driver's current location (fire-and-forget)
  if (stop?.route_id) reoptimizeRoute(stop.route_id);
}

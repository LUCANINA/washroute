let allAdminMessages = [], allCustomerSms = [], msgSubscription = null, smsMsgSubscription = null, unreadCount = 0;
let _msgActiveThread = null; // null = conversation list, 'admin' = admin thread, customer_id = customer thread
let _msgCustomerMap = {};    // customer_id → { name, phone, stopType }
let _smsSessionStart = null; // timestamp when driver data loaded — only show SMS after this

async function loadDriverMessages() {
  if (!currentDriver) return;
  const { data } = await db.from('driver_messages')
    .select('*')
    .eq('driver_id', currentDriver.id)
    .order('created_at', { ascending: true });
  allAdminMessages = data || [];
  updateMsgBadge();
}

async function loadCustomerSms() {
  if (!currentDriver) return;
  // Record session start — driver thread only shows messages from this point forward
  if (!_smsSessionStart) _smsSessionStart = new Date().toISOString();
  // RLS policy ensures we only get SMS for customers on today's routes.
  // Date filter caps the payload to the last 7 days — without it, every login
  // pulled the entire SMS history for every customer the driver has ever served
  // (sometimes thousands of rows). 7 days is plenty of context for any active stop.
  const sevenDaysAgo = new Date(Date.now() - 7 * 86400000).toISOString();
  const { data } = await db.from('sms_messages')
    .select('*')
    .gte('created_at', sevenDaysAgo)
    .order('created_at', { ascending: true });
  allCustomerSms = data || [];

  // Build customer map from today's + upcoming stops for display names + phone
  _msgCustomerMap = {};
  const allRouteIds = [...todayRoutes, ...upcomingRoutes].map(r => r.id);
  const allActiveStops = allStops.filter(s => allRouteIds.includes(s.route_id));
  allActiveStops.forEach(s => {
    const cust = s.orders?.customers;
    const custId = s.orders?.customer_id;
    if (custId && cust && !_msgCustomerMap[custId]) {
      _msgCustomerMap[custId] = {
        name: `${cust.first_name_cache || ''} ${cust.last_name_cache || ''}`.trim() || 'Customer',
        phone: cust.phone_cache,
        stopType: s.stop_type,
      };
    }
  });
}

function updateMsgBadge() {
  const adminUnread = allAdminMessages.filter(m => m.sender_type === 'admin' && !m.read_at).length;
  // Customer SMS: count inbound messages from this session that driver hasn't read
  const custUnread = allCustomerSms.filter(m =>
    m.direction === 'inbound' && _smsSessionStart && m.created_at >= _smsSessionStart && !m._driverRead
  ).length;
  unreadCount = adminUnread + custUnread;
  const badge = document.getElementById('msg-nav-badge');
  if (!badge) return;
  badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
  badge.style.display = unreadCount > 0 ? 'flex' : 'none';
}

async function markAdminMessagesRead() {
  const unread = allAdminMessages.filter(m => m.sender_type === 'admin' && !m.read_at);
  if (!unread.length) return;
  const ids = unread.map(m => m.id);
  const now = new Date().toISOString();
  await db.from('driver_messages').update({ read_at: now }).in('id', ids);
  allAdminMessages.forEach(m => { if (ids.includes(m.id)) m.read_at = now; });
  updateMsgBadge();
}

// ── Conversation list (main Messages tab) ──
function renderConversationList() {
  const el = document.getElementById('msg-conv-list');
  if (!el) return;

  let h = '';

  // Admin thread (always shown)
  const lastAdmin = allAdminMessages.length ? allAdminMessages[allAdminMessages.length - 1] : null;
  const adminUnread = allAdminMessages.filter(m => m.sender_type === 'admin' && !m.read_at).length;
  h += `<div class="msg-conv-label">Team</div>`;
  h += `<div class="msg-conv-item" onclick="openMessageThread('admin')">
    <div class="msg-conv-avatar avatar-admin">FL</div>
    <div class="msg-conv-info">
      <div class="msg-conv-name">Family Laundry</div>
      <div class="msg-conv-preview">${lastAdmin ? lastAdmin.body.substring(0, 50) : 'Send a message to the team'}</div>
    </div>
    <div class="msg-conv-meta">
      ${lastAdmin ? `<div class="msg-conv-time">${fmtMsgTime(lastAdmin.created_at)}</div>` : ''}
      ${adminUnread > 0 ? `<div class="msg-conv-badge">${adminUnread}</div>` : ''}
    </div>
  </div>`;

  // Customer threads — only messages from this driver session (clean thread)
  const custGroups = {};
  allCustomerSms.filter(m => _smsSessionStart && m.created_at >= _smsSessionStart).forEach(m => {
    if (!m.customer_id) return;
    if (!custGroups[m.customer_id]) custGroups[m.customer_id] = [];
    custGroups[m.customer_id].push(m);
  });

  // Also add customers from today's stops who have NO messages yet (so driver can initiate)
  Object.keys(_msgCustomerMap).forEach(cid => {
    if (!custGroups[cid]) custGroups[cid] = [];
  });

  const custEntries = Object.entries(custGroups)
    .filter(([cid]) => _msgCustomerMap[cid]) // only show customers on today's routes
    .sort((a, b) => {
      const aLast = a[1].length ? new Date(a[1][a[1].length-1].created_at) : new Date(0);
      const bLast = b[1].length ? new Date(b[1][b[1].length-1].created_at) : new Date(0);
      return bLast - aLast;
    });

  if (custEntries.length > 0) {
    h += `<div class="msg-conv-label">Customers</div>`;
    custEntries.forEach(([custId, msgs]) => {
      const info = _msgCustomerMap[custId] || { name: 'Customer' };
      const lastMsg = msgs.length ? msgs[msgs.length - 1] : null;
      const initials = info.name.split(' ').map(p => p[0]).join('').toUpperCase().slice(0, 2);
      const todayStart = new Date(); todayStart.setHours(0,0,0,0);
      const newInbound = msgs.filter(m => m.direction === 'inbound' && new Date(m.created_at) >= todayStart && !m._driverRead).length;
      const typeBadge = info.stopType === 'pickup'
        ? '<span style="color:#3b82f6;font-size:10px;font-weight:700;margin-left:6px">P</span>'
        : info.stopType === 'delivery'
        ? '<span style="color:#10b981;font-size:10px;font-weight:700;margin-left:6px">D</span>'
        : '';

      h += `<div class="msg-conv-item" onclick="openMessageThread('${custId}')">
        <div class="msg-conv-avatar avatar-customer">${initials}</div>
        <div class="msg-conv-info">
          <div class="msg-conv-name">${info.name}${typeBadge}</div>
          <div class="msg-conv-preview">${lastMsg ? (lastMsg.direction === 'outbound' ? 'You: ' : '') + lastMsg.body.substring(0, 45) : 'Tap to send a message'}</div>
        </div>
        <div class="msg-conv-meta">
          ${lastMsg ? `<div class="msg-conv-time">${fmtMsgTime(lastMsg.created_at)}</div>` : ''}
          ${newInbound > 0 ? `<div class="msg-conv-badge">${newInbound}</div>` : ''}
        </div>
      </div>`;
    });
  }

  if (!allAdminMessages.length && !custEntries.length) {
    h += `<div class="msg-empty">
      <div class="msg-empty-icon">${ICONS.msg}</div>
      <div style="font-size:18px;font-weight:800;margin-bottom:8px">No Messages Yet</div>
      <div style="font-size:14px;color:var(--muted);line-height:1.6">Messages with the team and customers will appear here.</div>
    </div>`;
  }

  el.innerHTML = h;
}

function fmtMsgTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const isToday = d.toLocaleDateString('en-CA', { timeZone: BIZ_TZ }) === now.toLocaleDateString('en-CA', { timeZone: BIZ_TZ });
  return isToday
    ? d.toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: BIZ_TZ })
    : d.toLocaleString('en-US', { month: 'short', day: 'numeric', timeZone: BIZ_TZ });
}

// ── Open a thread ──
function openMessageThread(threadId) {
  _msgActiveThread = threadId;

  // Show thread screen, hide conversation list
  document.getElementById('screen-messages').classList.remove('active');
  const threadScreen = document.getElementById('screen-msg-thread');
  threadScreen.style.display = 'flex';
  threadScreen.classList.add('active');

  if (threadId === 'admin') {
    document.getElementById('msg-thread-title').textContent = 'Family Laundry';
    document.getElementById('msg-thread-sub').textContent = 'Team chat';
    document.getElementById('msg-input').placeholder = 'Reply to the team…';
    markAdminMessagesRead();
  } else {
    const info = _msgCustomerMap[threadId] || { name: 'Customer' };
    document.getElementById('msg-thread-title').textContent = info.name;
    document.getElementById('msg-thread-sub').textContent = info.stopType === 'pickup' ? 'Pickup customer' : info.stopType === 'delivery' ? 'Delivery customer' : 'Customer';
    document.getElementById('msg-input').placeholder = `Message ${info.name.split(' ')[0]}…`;
    // Mark customer inbound as read for this driver
    allCustomerSms.forEach(m => { if (m.customer_id === threadId && m.direction === 'inbound') m._driverRead = true; });
    updateMsgBadge();
  }

  renderThreadMessages();
  const input = document.getElementById('msg-input');
  if (input) input.value = '';
}

function closeMessageThread() {
  _msgActiveThread = null;
  document.getElementById('screen-msg-thread').classList.remove('active');
  document.getElementById('screen-msg-thread').style.display = 'none';
  showScreen('messages');
  renderConversationList();
}

// Open a customer thread from the stop detail "Text" button
function openCustomerThread(customerId) {
  goTo('messages');
  setTimeout(() => openMessageThread(customerId), 50);
}

// ── Render messages inside a thread ──
function renderThreadMessages() {
  const thread = document.getElementById('msg-thread');
  if (!thread) return;

  let messages = [];
  if (_msgActiveThread === 'admin') {
    messages = allAdminMessages;
  } else {
    // Clean thread: only messages created after this driver session started
    messages = allCustomerSms.filter(m => m.customer_id === _msgActiveThread
      && _smsSessionStart && m.created_at >= _smsSessionStart);
  }

  if (!messages.length) {
    const placeholder = _msgActiveThread === 'admin'
      ? 'Send a message to the team below.'
      : 'Send a message — it will be delivered from the Family Laundry number.';
    thread.innerHTML = `<div class="msg-empty">
      <div class="msg-empty-icon">${ICONS.msg}</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">No messages yet</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.5">${placeholder}</div>
    </div>`;
    return;
  }

  let h = '';
  messages.forEach(m => {
    let isFromMe, avatarClass, avatarText, senderName;

    if (_msgActiveThread === 'admin') {
      isFromMe = m.sender_type === 'driver';
      avatarClass = isFromMe ? 'avatar-driver' : 'avatar-admin';
      avatarText = isFromMe ? (currentProfile?.first_name?.[0] || 'D').toUpperCase() : 'FL';
      senderName = isFromMe ? 'You' : 'Family Laundry';
    } else {
      isFromMe = m.direction === 'outbound';
      avatarClass = isFromMe ? 'avatar-admin' : 'avatar-customer';
      const custInfo = _msgCustomerMap[_msgActiveThread] || { name: 'Customer' };
      avatarText = isFromMe ? 'FL' : custInfo.name.split(' ').map(p => p[0]).join('').toUpperCase().slice(0, 2);
      senderName = isFromMe ? 'Family Laundry' : custInfo.name.split(' ')[0];
    }

    const wrapClass = isFromMe ? 'from-driver' : 'from-admin';
    const isUnread = _msgActiveThread === 'admin' && !isFromMe && !m.read_at;
    const d = new Date(m.created_at);
    const timeStr = d.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', timeZone: BIZ_TZ });

    h += `<div class="msg-bubble-wrap ${wrapClass}">
      <div class="msg-avatar ${avatarClass}">${avatarText}</div>
      <div class="msg-bubble-inner">
        <div class="msg-sender">${senderName}</div>
        <div class="msg-bubble${isUnread ? ' unread' : ''}">
          <div class="msg-body">${m.body.replace(/\n/g, '<br>')}</div>
          <div class="msg-time">${timeStr}</div>
        </div>
      </div>
    </div>`;
  });

  thread.innerHTML = h;
  setTimeout(() => { thread.scrollTop = thread.scrollHeight; }, 50);
}

// ── Send message (works for both admin and customer threads) ──
async function sendMessageInThread() {
  const input = document.getElementById('msg-input');
  const btn   = document.getElementById('btn-msg-send');
  const body  = input?.value.trim();
  if (!body || !currentDriver) return;

  btn.disabled = true;
  input.disabled = true;

  try {
    if (_msgActiveThread === 'admin') {
      // Send to admin via driver_messages
      const { data, error } = await db.from('driver_messages').insert({
        driver_id: currentDriver.id,
        sender_type: 'driver',
        body,
      }).select().single();
      if (error) throw error;
      allAdminMessages.push(data);
    } else {
      // Send to customer via Twilio (company number)
      const custInfo = _msgCustomerMap[_msgActiveThread];
      if (!custInfo?.phone) { toast('No phone number on file'); return; }

      const res = await fetch(`${SUPA_URL}/functions/v1/send-sms`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${SUPA_KEY}`,
        },
        body: JSON.stringify({
          to: custInfo.phone,
          body: body,
          customer_id: _msgActiveThread,
          sent_by_driver_id: currentDriver.id,
        }),
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      // Add to local cache (the realtime subscription will also catch this)
      const fakeSms = {
        id: crypto.randomUUID(),
        customer_id: _msgActiveThread,
        direction: 'outbound',
        body: body,
        from_number: '',
        to_number: custInfo.phone,
        created_at: new Date().toISOString(),
        sent_by_driver_id: currentDriver.id,
      };
      allCustomerSms.push(fakeSms);
    }

    input.value = '';
    input.style.height = 'auto';
    renderThreadMessages();
    input.focus();
  } catch (e) {
    console.error('sendMessageInThread error:', e);
    toast('Could not send — check your connection');
  } finally {
    btn.disabled = false;
    input.disabled = false;
  }
}

// ── Realtime subscriptions ──
function subscribeToDriverMessages() {
  if (!currentDriver || msgSubscription) return;
  msgSubscription = db.channel('driver-msgs-all')
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'driver_messages'
    }, payload => {
      if (payload.new.driver_id !== currentDriver.id) return;
      if (allAdminMessages.find(m => m.id === payload.new.id)) return;
      allAdminMessages.push(payload.new);
      if (_msgActiveThread === 'admin') {
        renderThreadMessages();
        markAdminMessagesRead();
      } else if (document.getElementById('screen-messages')?.classList.contains('active')) {
        renderConversationList();
      }
      if (payload.new.sender_type === 'admin') {
        updateMsgBadge();
        if (_msgActiveThread !== 'admin') toast('New message from the team', 3500);
      }
    })
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'sms_messages'
    }, payload => {
      const msg = payload.new;
      // Only care about inbound messages for customers on our routes
      if (msg.direction !== 'inbound') return;
      if (!msg.customer_id || !_msgCustomerMap[msg.customer_id]) return;
      if (allCustomerSms.find(m => m.id === msg.id)) return;
      allCustomerSms.push(msg);
      const custName = _msgCustomerMap[msg.customer_id]?.name?.split(' ')[0] || 'Customer';
      if (_msgActiveThread === msg.customer_id) {
        msg._driverRead = true;
        renderThreadMessages();
      } else if (document.getElementById('screen-messages')?.classList.contains('active')) {
        renderConversationList();
      }
      updateMsgBadge();
      if (_msgActiveThread !== msg.customer_id) {
        toast(`New message from ${custName}`, 3500);
      }
    })
    .subscribe(status => {
      console.log('Messages channel:', status);
      // Always reload after SUBSCRIBED — events that arrived during initial loadDriverMessages
      // could be dropped by handler guards. The previous `&& allAdminMessages.length > 0`
      // gate meant the FIRST subscribe (when no messages yet loaded) skipped the recovery
      // reload, permanently losing any admin message sent in the gap. Mirrors the D-M5 fix
      // we made for the route_stops channel.
      if (status === 'SUBSCRIBED') {
        loadDriverMessages().then(() => {
          if (_msgActiveThread === 'admin') renderThreadMessages();
          else if (document.getElementById('screen-messages')?.classList.contains('active')) renderConversationList();
          updateMsgBadge();
        }).catch(console.error);
      }
    });
}

/* ──────────────────────────────
   DEBOUNCED RESORT — when optimizer updates many stops at once,
   batch the re-sort + re-render into a single UI update.
   ────────────────────────────── */
let _resortTimer = null;
function debouncedResort() {
  if (_resortTimer) clearTimeout(_resortTimer);
  _resortTimer = setTimeout(() => {
    _resortTimer = null;
    sortStopsByWindow(allStops);
    renderHome();
    renderRoute();
    if (currentStopId) renderStopDetail(currentStopId);
  }, 300);  // 300ms debounce — fast enough to feel instant, slow enough to batch bulk updates
}

/* ──────────────────────────────
   REALTIME: ROUTE STOP + ORDER UPDATES
   Catches admin reassignments, cancellations, and any order
   status changes so the driver always sees current data.
────────────────────────────── */
let _stopSub = null;
function subscribeToRouteStopUpdates() {
  if (_stopSub || !currentDriver) return;
  _stopSub = db.channel('driver-stop-updates')

    // Route stop changed by admin (reassignment, route move, address edit, cancellation)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'route_stops' }, payload => {
      if (_dataLoading) return;
      const updated = payload.new;
      const idx = allStops.findIndex(s => s.id === updated.id);

      // Helper: is this route_id one of this driver's own routes (current or upcoming)?
      const isMyRoute = r => todayRoutes.some(t => t.id === r) || upcomingRoutes.some(t => t.id === r);
      // Helper: is this stop intended for this driver (explicit match or inherited via null)?
      const isMyDriver = d => d === currentDriver?.id || d === null;

      if (idx < 0) {
        // Stop not in our list — check if it just became ours, either by:
        //   (a) explicit assignment to me (driver_id set to my id), OR
        //   (b) inherit (driver_id=NULL) on one of my own routes — e.g. a stop
        //       moved onto my route by admin, or an optimize pass re-emitting
        //       an UPDATE we didn't see the first time.
        // Don't require isMyRoute for the explicit case — the route itself may have
        // just been reassigned to me too, so todayRoutes won't know about it yet.
        const explicitlyMine = updated.driver_id === currentDriver?.id;
        const inheritedOnMyRoute = updated.driver_id === null && isMyRoute(updated.route_id);
        if (explicitlyMine || inheritedOnMyRoute) {
          loadDriverData().then(() => { renderHome(); renderRoute(); }).catch(console.error);
        }
        return;
      }

      // Stop IS in our list — check if it was just moved/reassigned away from us:
      // (a) explicit assignment to a different driver, OR
      // (b) driver_id cleared to null but route moved to someone else's route
      const movedToOtherDriver = updated.driver_id !== null && updated.driver_id !== currentDriver?.id;
      const movedToOtherRoute  = updated.driver_id === null && !isMyRoute(updated.route_id);
      if (movedToOtherDriver || movedToOtherRoute) {
        allStops.splice(idx, 1);
        renderHome();
        renderRoute();
        if (currentStopId === updated.id) {
          currentStopId = null;
          showScreen('route');
          toast('This stop was reassigned to another driver.');
        }
        return;
      }

      // Detect if stop order or ETA changed (from optimizer) vs other field changes
      const orderChanged = allStops[idx].stop_number !== updated.stop_number
                        || allStops[idx].estimated_arrival !== updated.estimated_arrival;
      Object.assign(allStops[idx], updated);
      if (orderChanged) {
        // Optimizer updated stop order — debounce to batch multiple stop updates
        debouncedResort();
      } else {
        renderHome();
        renderRoute();
        if (currentStopId === updated.id) renderStopDetail(updated.id);
      }
    })

    // Route stop INSERTED (new stop added to one of this driver's routes by admin)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'route_stops' }, payload => {
      if (_dataLoading) return;
      const inserted = payload.new;
      const isMyRoute = todayRoutes.some(t => t.id === inserted.route_id) || upcomingRoutes.some(t => t.id === inserted.route_id);
      const isMyDriver = inserted.driver_id === currentDriver?.id || inserted.driver_id === null;
      if (isMyRoute && isMyDriver) {
        // Reload fully so we get the joined order/customer data for the new stop
        loadDriverData().then(() => { renderHome(); renderRoute(); }).catch(console.error);
      }
    })

    // Route stop DELETED (admin deleted order, or rollback detached stops)
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'route_stops' }, payload => {
      if (_dataLoading) return;
      const deleted = payload.old;
      const idx = allStops.findIndex(s => s.id === deleted.id);
      if (idx < 0) return;
      allStops.splice(idx, 1);
      renderHome();
      renderRoute();
      // If driver was viewing this stop, go back to route list
      if (currentStopId === deleted.id) {
        currentStopId = null;
        showScreen('route');
      }
    })

    // Order updated by admin (status change, bag count, special instructions, etc.)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'orders' }, payload => {
      if (_dataLoading) return;
      const updated = payload.new;
      // If order was cancelled or delivered by admin, remove the stop entirely
      if (['cancelled','delivered'].includes(updated.status)) {
        const idx = allStops.findIndex(s => s.orders?.id === updated.id);
        if (idx < 0) return;
        const removedStopId = allStops[idx].id;
        allStops.splice(idx, 1);
        renderHome();
        renderRoute();
        if (currentStopId === removedStopId) {
          currentStopId = null;
          showScreen('route');
        }
        return;
      }
      let affected = false;
      allStops.forEach(s => {
        if (s.orders?.id === updated.id) {
          Object.assign(s.orders, updated);
          affected = true;
        }
      });
      if (!affected) return;
      renderHome();
      renderRoute();
      if (currentStopId) {
        const stop = allStops.find(s => s.id === currentStopId);
        if (stop?.orders?.id === updated.id) renderStopDetail(currentStopId);
      }
    })

    // Order DELETED by admin (hard delete — cascade removes route_stop too,
    // but DELETE event on orders may arrive before route_stops cascade)
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'orders' }, payload => {
      if (_dataLoading) return;
      const deleted = payload.old;
      const idx = allStops.findIndex(s => s.orders?.id === deleted.id);
      if (idx < 0) return;
      const removedStopId = allStops[idx].id;
      allStops.splice(idx, 1);
      renderHome();
      renderRoute();
      if (currentStopId === removedStopId) {
        currentStopId = null;
        showScreen('route');
      }
    })

    // Route reassigned to/from this driver (admin changed the route's default driver)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'routes' }, payload => {
      if (_dataLoading) return;
      const updated = payload.new;
      const wasMyRoute = todayRoutes.some(r => r.id === updated.id) || upcomingRoutes.some(r => r.id === updated.id);
      const isNowMine  = updated.driver_id === currentDriver?.id || updated.driver_id === null;
      // Route was just given to us, or taken away — full reload
      if (wasMyRoute || isNowMine) {
        loadDriverData().then(() => { renderHome(); renderRoute(); }).catch(console.error);
      }
    })

    .subscribe(status => {
      console.log('Route/order updates channel:', status);
      // After SUBSCRIBED, always reload stop data — events that arrived during
      // the initial loadDriverData() got dropped by `if (_dataLoading) return`
      // in each handler. The previous `allStops.length > 0` guard meant the
      // first subscribe (when allStops is still empty) skipped the reload,
      // so any UPDATE that landed between the routes-fetch and stops-fetch
      // was permanently lost.
      if (status === 'SUBSCRIBED') {
        loadDriverData().then(() => { renderHome(); renderRoute(); }).catch(console.error);
      }
    });
}

/* ──────────────────────────────
   AUTH STATE CHANGE
────────────────────────────── */
// CRITICAL: Supabase-js deadlocks if you await Supabase calls inside onAuthStateChange.
// All async work is deferred via setTimeout(0). See: https://github.com/supabase/auth-js/issues/762
let _sessionLoading = false; // guard against concurrent _handleDriverSession calls
async function _handleDriverSession(event, session) {
  if (session?.user) {
    if (appReady || _sessionLoading) return;
    _sessionLoading = true;
    currentUser = session.user;

    const cached = loadDriverCache(currentUser.id);
    let loadFailed = false;
    if (cached) {
      currentProfile = cached.profile;
      currentDriver  = cached.driver;
      todayRoutes    = cached.routes || [];
      allStops       = cached.stops  || [];
      showLoading(false);
    } else {
      const btn = document.getElementById('btn-login');
      const err = document.getElementById('auth-err');
      const loadTimer = setTimeout(() => {
        if (document.getElementById('screen-auth')?.classList.contains('active')) {
          showLoading(false);
          if (btn) { btn.textContent = 'Sign In →'; btn.disabled = false; }
          err.textContent = 'Connection timed out — please try again.'; err.classList.add('show');
          // Also reset phone OTP panel in case driver came in via phone auth
          resetDriverPhone();
          switchAuthTab('password');
          _sessionLoading = false; // allow retry
        }
      }, 15000);
      showLoading(true);
      try {
        await loadDriverData();
      } catch(e) {
        console.error('loadDriverData:', e);
        loadFailed = true;
        toast('Could not load route data — pull down to retry');
      } finally {
        clearTimeout(loadTimer);
        showLoading(false);
      }
    }
    // If first load failed with no cache, don't lock out retries
    if (loadFailed && !cached) { appReady = false; _sessionLoading = false; return; }
    appReady = true;
    _sessionLoading = false;
    document.getElementById('bottom-nav').style.display = 'flex';
    initPhotoQueue(); // Resume any pending photo uploads from previous session
    subscribeToDriverMessages();
    subscribeToRouteStopUpdates();
    goTo('home');
    // Start live GPS tracking if driver has any active routes today
    if (todayRoutes.length) startGpsTracking();
    if (cached) loadDriverData().then(() => { renderHome(); renderRoute(); }).catch(console.error);
  } else {
    stopGpsTracking(); // Stop sending location when signed out
    appReady = false;
    currentUser = currentProfile = currentDriver = null;
    document.getElementById('bottom-nav').style.display = 'none';
    showScreen('auth');
  }
}
db.auth.onAuthStateChange((event, session) => {
  setTimeout(() => _handleDriverSession(event, session), 0);
});

// Global error handler — surface JS errors that would otherwise silently crash the app
window.addEventListener('error', e => {
  console.error('Unhandled error:', e.error || e.message);
  toast('Something went wrong — tap the ↻ refresh icon at the top');
});
window.addEventListener('unhandledrejection', e => {
  console.error('Unhandled promise rejection:', e.reason);
  toast('Something went wrong — tap the ↻ refresh icon at the top');
});
</script>
